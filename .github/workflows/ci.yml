name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out SDK source
        uses: actions/checkout@v7

      - name: Read pinned Oracle commit
        id: upstream
        run: echo "commit=$(jq -r .commit upstream.json)" >> "$GITHUB_OUTPUT"

      - name: Check out pinned Oracle specifications
        uses: actions/checkout@v7
        with:
          repository: oracle/hospitality-api-docs
          ref: ${{ steps.upstream.outputs.commit }}
          path: hospitality-api-docs
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.14.0
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: '1.25.x'
          cache: false

      - name: Install pinned build dependencies
        run: npm ci

      - name: Regenerate, test, and verify package contents
        run: npm run validate

      - name: Upload generator log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: openapi-generator-log
          path: build.log
          if-no-files-found: ignore
          retention-days: 14
