name: Check for Oracle API updates

on:
  schedule:
    - cron: '17 3 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out SDK source
        uses: actions/checkout@v7

      - name: Find latest Oracle release
        id: latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag=$(gh api repos/oracle/hospitality-api-docs/releases/latest --jq .tag_name)
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "release=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Compare source releases
        id: comparison
        env:
          LATEST_TAG: ${{ steps.latest.outputs.tag }}
        run: |
          current=$(jq -r .ref upstream.json)
          if [ "$current" = "$LATEST_TAG" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out candidate Oracle specifications
        if: steps.comparison.outputs.changed == 'true'
        uses: actions/checkout@v7
        with:
          repository: oracle/hospitality-api-docs
          ref: ${{ steps.latest.outputs.tag }}
          path: hospitality-api-docs
          persist-credentials: false

      - name: Resolve candidate commit
        if: steps.comparison.outputs.changed == 'true'
        id: candidate
        run: echo "commit=$(git -C hospitality-api-docs rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        if: steps.comparison.outputs.changed == 'true'
        uses: actions/setup-node@v7
        with:
          node-version: 22.14.0
          cache: npm

      - name: Set up Java
        if: steps.comparison.outputs.changed == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Go
        if: steps.comparison.outputs.changed == 'true'
        uses: actions/setup-go@v7
        with:
          go-version: '1.25.x'
          cache: false

      - name: Validate candidate update
        if: steps.comparison.outputs.changed == 'true'
        id: validation
        continue-on-error: true
        env:
          OHIP_UPDATE_MANIFEST: '1'
          RELEASE: ${{ steps.latest.outputs.release }}
          REF: ${{ steps.latest.outputs.tag }}
          COMMIT: ${{ steps.candidate.outputs.commit }}
        run: |
          npm ci
          node scripts/set-upstream-version.mjs "$RELEASE" "$REF" "$COMMIT"
          npm run validate

      - name: Open update pull request
        if: steps.comparison.outputs.changed == 'true' && steps.validation.outcome == 'success'
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automation/oracle-${{ steps.latest.outputs.release }}
          delete-branch: true
          commit-message: 'feat(upstream): update Oracle specs to ${{ steps.latest.outputs.release }}'
          title: 'feat(upstream): update Oracle specs to ${{ steps.latest.outputs.release }}'
          body: |
            Updates the pinned Oracle Hospitality API source to `${{ steps.latest.outputs.tag }}` at `${{ steps.candidate.outputs.commit }}`.

            The full SDK generation, TypeScript tests, all Go module tests, and npm package smoke tests passed. Review generated API compatibility and apply the appropriate release label before merging.

      - name: Report an update requiring maintenance
        if: steps.comparison.outputs.changed == 'true' && steps.validation.outcome == 'failure'
        uses: actions/github-script@v9
        env:
          RELEASE: ${{ steps.latest.outputs.release }}
          REF: ${{ steps.latest.outputs.tag }}
          COMMIT: ${{ steps.candidate.outputs.commit }}
        with:
          script: |
            const title = `Oracle Hospitality API ${process.env.RELEASE} needs manual migration`;
            const body = [
              `The scheduled update check found ${process.env.REF} at \`${process.env.COMMIT}\`,`,
              'but the existing patches or generated SDK validation failed.',
              '',
              `See workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              ...context.repo,
              state: 'open',
            });
            const issue = existing.find(candidate => candidate.title === title);
            if (issue) {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: issue.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                ...context.repo,
                title,
                body,
              });
            }
